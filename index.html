<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sphere Runner</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#1a1a2e;
  display:flex; align-items:center; justify-content:center;
  height:100vh; overflow:hidden;
  font-family:'Segoe UI',sans-serif;
}
#wrap { position:relative; width:900px; height:540px; }
canvas { display:block; border-radius:16px; box-shadow:0 0 60px rgba(0,0,0,.6); }
 
#hud {
  position:absolute; top:0; left:0; right:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px; pointer-events:none; z-index:5;
}
.pill {
  background:#2272b8; color:#fff; font-weight:700; font-size:17px;
  padding:7px 22px; border-radius:30px;
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
#diamondPill {
  display:flex; align-items:center; gap:6px;
  background:#2272b8; color:#fff; font-weight:700; font-size:15px;
  padding:7px 16px; border-radius:30px;
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
#pauseBtn {
  pointer-events:all; cursor:pointer;
  background:#2272b8; border:none; border-radius:30px;
  padding:7px 20px; display:flex; align-items:center; gap:8px;
  color:#fff; font-weight:700; font-size:15px;
  box-shadow:0 2px 12px rgba(0,0,0,.3); transition:background .15s;
}
#pauseBtn:hover, #muteBtn:hover { background:#1a5c9a; }
.picon { display:flex; gap:3px; }
.picon span { display:block; width:3px; height:13px; background:#fff; border-radius:2px; }
 
#progressBar {
  position:absolute; bottom:0; left:0; right:0; height:5px;
  background:rgba(0,0,0,.12); border-radius:0 0 16px 16px; overflow:hidden; z-index:5;
}
#progressFill {
  height:100%; background:linear-gradient(90deg,#c97b3a,#e6a84e); width:0%;
  border-radius:0 0 16px 16px;
}
 
#overlay, #pauseOverlay {
  position:absolute; inset:0; background:rgba(250,235,215,.96);
  border-radius:16px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:16px; z-index:10;
}
#pauseOverlay { display:none; }
#overlay h1, #pauseOverlay h2 { font-size:48px; font-weight:900; color:#c97b3a; }
#overlay p { font-size:15px; color:#7a6050; text-align:center; max-width:380px; line-height:1.65; }
.hint-box {
  font-size:14px; color:#a08878;
  background:rgba(201,123,58,.1); border-radius:10px;
  padding:10px 20px; text-align:center; line-height:1.8;
}
#finalScore { font-size:21px; color:#c97b3a; font-weight:800; display:none; }
.big-btn {
  background:#2272b8; color:#fff; border:none;
  padding:13px 46px; border-radius:30px;
  font-size:18px; font-weight:700; cursor:pointer;
  box-shadow:0 4px 16px rgba(34,114,184,.4);
  transition:transform .1s, background .2s;
}
.big-btn:hover { background:#1a5c9a; transform:scale(1.04); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="900" height="540"></canvas>
 
  <div id="hud">
    
    <button id="muteBtn" style="pointer-events:all; cursor:pointer; background:#2272b8; border:none; border-radius:30px; padding:7px 16px; display:flex; align-items:center; gap:6px; color:#fff; font-weight:700; font-size:15px; box-shadow:0 2px 12px rgba(0,0,0,.3); transition:background .15s;">
      <span id="muteIcon">🔊</span> 
    </button>
    <div class="pill">Score: <span id="scoreVal">0</span></div>
    <div style="display:flex;align-items:center;gap:10px">
      <div id="diamondPill">
        <svg width="12" height="16" viewBox="0 0 12 16"><polygon points="6,0 12,6 6,16 0,6" fill="#f5d44a"/></svg>
        <span id="diamondVal">0</span>
      </div>
      <button id="pauseBtn">
        <div class="picon"><span></span><span></span></div>Pause
      </button>
    </div>
  </div>
 
  <div id="progressBar"><div id="progressFill"></div></div>
 
  <div id="overlay">
    <h1>Sphere Runner</h1>
    <p>Test version of the computer game on the Cynteract app</p>
    <div class="hint-box">
      Hold <b>SPACE</b> to shrink and pass through obstacles.<br>
      Release to grow. Collect diamonds!
    </div>
    <div id="finalScore"></div>
    <button class="big-btn" id="actionBtn">Start Game</button>
  </div>
 
  <div id="pauseOverlay">
    <h2>Paused</h2>
    <button class="big-btn" id="resumeBtn">Resume</button>
  </div>
</div>
 
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 900, H = 540;
const GROUND_Y  = H - 80;   
const SPHERE_X  = 200;       
const R_BIG     = 28;
const R_SMALL   = 11;
const GAME_SECS = 120;

const SPEED_MIN = 1.5;
const SPEED_MAX = 1.9;
 
/* ─── palette ─────────────────────────────── */
const BG1='#fae8d4', BG2='#f0d4b8';
const SP_BASE='#c07238', SP_MID='#d4844a', SP_LIT='#dfa06a';
 
/* ─── state ──────────────────────────────── */
let gs='menu';
let score=0, gems=0, elapsed=0, lastTs=0;
let keys={};
let animId;
 
// Add your sound file path here (e.g., 'congratulations.mp3' or 'win.wav')
const congratsSound = new Audio('CongratulationsSound.mp3');
const diamondSound = new Audio('DiamondCollected.wav');
const bgMusic = new Audio('BackgroundMusic.wav');
bgMusic.loop = true; 
bgMusic.volume = 0.4; 
let isMuted = false;

/* sphere */
let sp={y:0, vy:0, r:R_BIG, targetR:R_BIG};
 
/* world objects */
let obstacles=[], collectibles=[], clouds=[], blobs=[];
let particles=[];
let trailPts=[];   
let worldX=0;      
let trembleOffset = 0; 
 
/* ─── Level Up Event State ─── */
let levelUpTriggered = false;
let levelUpEvent = {
  active: false,
  timer: 0,
  duration: 4.5,      
  yOffset: 160,       
  targetY: 160,       
  textAlpha: 0,       
  text: "Great work, don't stop now"
};

/* timers */
let tObs=0.15;
let tGem=4.5; 
let tCloud=0.0;

/* ─── Terrain Drop State ─── */
const DROP_LIFT    = 80;         // px the scene rises before the drop
const DROP_GAP_W   = 180;        // width of the floor gap
const DROP_LOW_W   = 420;        // width of lower floor section
const DROP_STEP_H  = R_BIG*2.8; // how far down the lower floor sits
let sceneOffsetY   = 0;
let sceneOffsetTarget = 0;
let dropState      = 'idle';     // 'idle'|'lifting'|'dropped'|'lowering'
let dropGap        = null;       // gap geometry in world-X coords
let dropSchedule   = [];         // [{time, hole}]
 
/* ─── helpers ─────────────────────────────── */
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
 
function worldToScreen(wx){ return wx - worldX + SPHERE_X; }
 
function circleRect(cx,cy,cr, rx,ry,rw,rh){
  const nx=clamp(cx,rx,rx+rw), ny=clamp(cy,ry,ry+rh);
  return (cx-nx)**2+(cy-ny)**2 < cr*cr;
}
 
/* ─── reset ───────────────────────────────── */
function reset(){
congratsSound.pause();
  congratsSound.currentTime = 0;
  diamondSound.pause();
  diamondSound.currentTime = 0;
  bgMusic.pause();     
  bgMusic.currentTime = 0;
  bgMusic.volume = 0.4;
  score=0; gems=0; elapsed=0; worldX=0; trembleOffset = 0;
  keys={};
  sp={y:GROUND_Y-R_BIG, vy:0, r:R_BIG, targetR:R_BIG};
  obstacles=[]; collectibles=[]; particles=[];
  trailPts=[];
  clouds=[]; blobs=[];
  tObs=0.15; tGem=4.5; tCloud=0; 
  for(let i=0;i<5;i++) addCloud(Math.random()*W);
  for(let i=0;i<4;i++) addBlob(Math.random()*W);
  levelUpTriggered = false;
  levelUpEvent.active = false;
  levelUpEvent.yOffset = 160;
  levelUpEvent.targetY = 160;
  levelUpEvent.textAlpha = 0;

  // 4 drops evenly spread across the game, 2 of them hole-type
  sceneOffsetY = 0; sceneOffsetTarget = 0;
  dropState = 'idle'; dropGap = null;
  const baseTimes = [15, 42, 70, 98];
  const holeSlots = new Set();
  while(holeSlots.size < 2) holeSlots.add(Math.floor(Math.random()*4));
  dropSchedule = baseTimes.map((t,i) => ({ time: t + Math.random()*8, hole: holeSlots.has(i) }));
}
 
/* ─── spawners ────────────────────────────── */
function addCloud(sx){
  const wx = sx + worldX - SPHERE_X;
  const puffs = [];
  puffs.push({dx: 0, dy: 0, r: 25});
  puffs.push({dx: -16, dy: 2, r: 23});
  puffs.push({dx: 16, dy: 2, r: 23});
  puffs.push({dx: -34, dy: 4, r: 18});
  puffs.push({dx: 34, dy: 4, r: 18});
  puffs.push({dx: -50, dy: 6, r: 14});
  puffs.push({dx: 50, dy: 6, r: 14});
     
  const cloudScale = 0.9 + Math.random() * 0.3;
  puffs.forEach(p => { p.dx *= cloudScale; p.dy *= cloudScale; p.r *= cloudScale; });
  clouds.push({ wx, y: 40 + Math.random() * 110, puffs, spd: 0.15 + Math.random() * 0.2 });
}
 
function addBlob(sx){
  const wx=sx+worldX-SPHERE_X;
  blobs.push({wx, y:80+Math.random()*(H-220), r:50+Math.random()*90, a:0.03+Math.random()*0.04, spd:1.0+Math.random()*0.7});
}
 
function spawnObs(){
  const sx0 = W + 80;
  for(const o of obstacles){ if(o.sx + o.w + 140 > sx0) return false; }

  const pool=[ 
    {t:'gate', w:45}, 
    {t:'bar_low', w:35}, 
    {t:'step_up', w:20}, 
    {t:'step_down', w:15} 
  ];
  const tot=pool.reduce((s,a)=>s+a.w,0);
  let r=Math.random()*tot;
  let type=pool[pool.length-1].t;
  for(const p of pool){r-=p.w; if(r<=0){type=p.t;break;}}
 
  if(type==='bar_low'){
    const bh = 18;
    const by = GROUND_Y - R_BIG * 1.6 - bh;
    const maxR = Math.floor((GROUND_Y - by - bh) / 2) - 2;
    const bw = 130 + Math.random() * 80;
    obstacles.push({t:'bar_low', sx:sx0, y:by, w:bw, h:bh, maxR});
  }
  else if(type==='gate'){
    const gapH  = R_SMALL * 2 + 8;
    const gapMid = GROUND_Y - R_SMALL; 
    const gt = gapMid - gapH / 2;
    const gb = gapMid + gapH / 2;
    const maxR = Math.floor(gapH / 2) - 1;
    const ww = 24;
    obstacles.push({t:'gate', sx:sx0, y:0,  w:ww, h:gt,    maxR});
    obstacles.push({t:'gate_bottom', sx:sx0, y:gb, w:ww, h:H - gb, maxR}); 
  }
  else if(type==='step_up'){
    const sh = 11; 
    const sy = GROUND_Y - sh;
    const sw = 250 + Math.random() * 100;
    obstacles.push({t:'step_up', sx:sx0, y:sy, w:sw, h:sh + 100, maxR: R_BIG});
  }
  else if(type==='step_down'){
    const sh = 11; 
    const sy = GROUND_Y - sh;
    const sw = 250 + Math.random() * 100;
    obstacles.push({t:'step_down', sx:sx0, y:sy, w:sw, h:sh + 100, maxR: R_BIG});
  }
  return true;
}
 
function spawnGem(){
  for(let i=0; i<60; i++){
    const sx = W + 40 + Math.random() * 140;

    // Use lower floor as baseline if we're in a drop
    let baselineY = (dropGap && worldToScreen(dropGap.gapEndWX) < sx && sx < worldToScreen(dropGap.lowFloorEndWX))
      ? dropGap.lowY
      : GROUND_Y;

    for(const o of obstacles){
      if(o.t === 'step_up' || o.t === 'step_down'){
        if(sx >= o.sx && sx <= o.sx + o.w) baselineY = o.y;
      }
    }

    // Always at big-sphere hover height — always reachable without shrinking
    const y = baselineY - (R_BIG + 20);

    let overlap = false;
    const padX = 22, padY = 22;
    for(const o of obstacles){
      if(o.t === 'step_up' || o.t === 'step_down'){
        if(sx+padX > o.sx && sx-padX < o.sx+o.w && y+padY > o.y){ overlap=true; break; }
      } else {
        if(sx+padX > o.sx && sx-padX < o.sx+o.w && y+padY > o.y && y-padY < o.y+o.h){ overlap=true; break; }
      }
    }
    if(!overlap){
      collectibles.push({sx, y, small:false, pulse:Math.random()*Math.PI*2, done:false});
      break;
    }
  }
}
 
function burst(x,y,col,n,spd){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,v=1+Math.random()*spd;
    particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-1.2, r:2+Math.random()*3,col,life:1,dc:0.025+Math.random()*0.03});
  }
}
 
/* ─── update ──────────────────────────────── */
function update(dt){
  elapsed+=dt;
  const prog  = clamp(elapsed/GAME_SECS, 0, 1);
  const speed = lerp(SPEED_MIN, SPEED_MAX, prog);
 
  const wantSmall = !!(keys[' '] || keys['Space']);
  
  if (wantSmall) {
    sp.targetR = R_SMALL;
  } else {
    // Default to maximum size when no obstacles are restricting us
    let requiredMaxR = R_BIG;

    for(const o of obstacles) {
      if(o.t === 'bar_low' || o.t === 'gate' || o.t === 'gate_bottom') {
        let num = 0.6*sp.r; 
        if (o.t == 'bar_low') num = 0.3*sp.r; 
        // Check if the sphere is horizontally inside or overlapping the obstacle channel
        if (SPHERE_X + (sp.r-num) >= o.sx && SPHERE_X - sp.r <= o.sx + o.w) {
          if (o.maxR < requiredMaxR) {
            requiredMaxR = o.maxR;
          }
        }
      }
    }
    // Allow the sphere to grow up to the exact maximum safe limit of the current obstacle
    sp.targetR = requiredMaxR;
  }
  sp.r = lerp(sp.r, sp.targetR, 0.18);

  let activeFloorY = GROUND_Y;
  if (dropGap) {
    const wx = worldX;
    if (wx >= dropGap.gapStartWX && wx < dropGap.lowFloorEndWX) activeFloorY = dropGap.lowY;
  }
  for (const o of obstacles) {
    if (o.t === 'step_up' || o.t === 'step_down') {
      if (SPHERE_X >= o.sx && SPHERE_X <= o.sx + o.w) activeFloorY = o.y;
    }
    // Drop hole bars: sphere rides on top unless it's small enough to fall through the hole
    if (o._drop && o.t === 'bar_low') {
      if (SPHERE_X >= o.sx && SPHERE_X <= o.sx + o.w) {
        activeFloorY = o.y; // always ride the bar segments themselves
      }
    }
  }
  // In the hole gap between the two bars: only fall if sphere fits through
  if (dropGap && dropGap.holeW) {
    const holeHalfW = dropGap.holeW / 2;
    const holeScreenCentreX = worldToScreen(dropGap.gapStartWX) + DROP_GAP_W / 2;
    const overHole = SPHERE_X >= holeScreenCentreX - holeHalfW && SPHERE_X <= holeScreenCentreX + holeHalfW;
    // Once sphere drops below bar level, it stays on lower floor — never snaps back up
    const alreadyFell = sp.y > dropGap.holeBarY + sp.r + 2;
    if (alreadyFell) {
      dropGap.fell = true;
    }
    if (dropGap.fell) {
      activeFloorY = dropGap.lowY;
    } else if (overHole) {
      if (sp.r * 2 <= dropGap.holeW) {
        activeFloorY = dropGap.lowY;
      } else {
        activeFloorY = dropGap.holeBarY;
      }
    }
  }

  let physicalBlocker = false;

  for(const o of obstacles){
    if (o.t === 'step_up') {
      const sphereFront = SPHERE_X + sp.r;
      
      // Check if the sphere is overlapping the platform horizontally
      if (sphereFront >= o.sx && SPHERE_X <= o.sx + o.w) {
        // ONLY block if you are small AND your lowest point is physically below the platform's surface height.
        // (Adding a 2px buffer ensures that minor landing calculations don't trigger a false wall crash)
        if (sp.r <= R_SMALL + 10 && sp.y + sp.r > o.y + 2) {
          physicalBlocker = true;
          break;
        }
      }
    } 
    else if (o.t === 'step_down') {
      continue;
    }
    else if (o._drop) {
      continue; // drop bars: sphere lands on top via activeFloorY, not blocked laterally
    }
    else {
      if (circleRect(SPHERE_X, sp.y, sp.r, o.sx, o.y, o.w, o.h)) {
        if (sp.r > o.maxR) {
          physicalBlocker = true;
          break;
        }
      }
    }
  }

  sp.vy += 1000 * dt;
  sp.y  += sp.vy * dt;
   
  const targetLanding = activeFloorY - sp.r;
  if (sp.y >= targetLanding) { 
    sp.y = targetLanding; 
    sp.vy = 0; 
  }
 
  if(!physicalBlocker){
    trembleOffset = 0; 
    obstacles.forEach(o    => { o.sx -= speed; });
    collectibles.forEach(c => { c.sx -= speed; });
    clouds.forEach(c       => { c.wx -= c.spd; });
    worldX += speed;
    score  += dt * 3 * (1 + prog * 0.8);

    tObs -= dt; tGem -= dt;
    if(tObs <= 0){ 
      if(dropState === 'idle' && spawnObs()) { tObs = 1.6 - prog*0.5 + Math.random()*0.5; }
      else { tObs = 0.1; }
    }
    if(tGem   <= 0){ spawnGem(); tGem = 4.5 + Math.random() * 3.0; }
  } else {
    trembleOffset = (Math.random() - 0.5) * 4.0;
  }
 
  if(!physicalBlocker){
    trailPts.unshift({wx: worldX, y: sp.y, r: sp.r});
    if(trailPts.length > 120) trailPts.pop();
  }
 
  if(!physicalBlocker) {
    tCloud -= dt;
    if(tCloud <= 0){ addCloud(W+160); addBlob(W+80); tCloud = 4.0 + Math.random()*3.0; }
  }
 
  obstacles    = obstacles   .filter(o => o.sx + o.w > -60);
  collectibles = collectibles.filter(c => !c.done && c.sx > -60);
  const cullWX = worldX - (SPHERE_X + 160);
  trailPts = trailPts.filter(t => t.wx > cullWX - 20);
  clouds   = clouds  .filter(c => worldToScreen(c.wx) > -120);
  blobs    = blobs   .filter(b => b.wx + b.r > cullWX);
 
  for(const g of collectibles){
    if(g.done) continue;
    if(Math.hypot(SPHERE_X - g.sx, sp.y - g.y) < sp.r + 14){
      g.done = true; gems++; score += 20;
      burst(g.sx, g.y, '#f5d44a', 14, 3.5);
      diamondSound.currentTime = 0; // Rewinds sound so rapid collections play instantly
      diamondSound.play().catch(err => console.log("Audio blocked:", err));
    }
  }
 
  particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=p.dc; });
  particles = particles.filter(p => p.life > 0);
 
  if (!levelUpTriggered && elapsed >= 90) {
    levelUpTriggered = true;
    levelUpEvent.active = true;
    levelUpEvent.timer = levelUpEvent.duration;
    levelUpEvent.targetY = 0;
    // Play the congratulatory audio cue
    congratsSound.currentTime = 0; // Rewind to start in case it gets re-triggered
    congratsSound.play().catch(err => console.log("Audio playback blocked by browser:", err));

  }
  if (levelUpEvent.active) {
    levelUpEvent.timer -= dt;
    levelUpEvent.yOffset = lerp(levelUpEvent.yOffset, levelUpEvent.targetY, 0.1);
    if (levelUpEvent.timer > 0.8 && levelUpEvent.yOffset < 15) {
      levelUpEvent.textAlpha = lerp(levelUpEvent.textAlpha, 1, 0.15);
    } else if (levelUpEvent.timer <= 0.8) {
      levelUpEvent.textAlpha = lerp(levelUpEvent.textAlpha, 0, 0.2);
    }
    if (levelUpEvent.timer <= 0.5) levelUpEvent.targetY = 160;
    if (levelUpEvent.timer <= 0 && levelUpEvent.yOffset >= 155) levelUpEvent.active = false;
  }

  // ─── Terrain Drop Logic ───
  if (dropState === 'idle' && dropSchedule.length > 0 && elapsed >= dropSchedule[0].time) {
    const drop = dropSchedule.shift();
    dropState = 'lifting';
    sceneOffsetTarget = -DROP_LIFT;
    const gapStartWX = worldX + (W - SPHERE_X) + 300;
    dropGap = {
      gapStartWX,
      gapEndWX:      gapStartWX + DROP_GAP_W,
      lowFloorEndWX: gapStartWX + DROP_GAP_W + DROP_LOW_W,
      lowY:          GROUND_Y + DROP_STEP_H,
      hole:          drop.hole
    };
    if (drop.hole) {
      // A single thin bar that straddles the floor gap — left piece before, right piece after.
      // Sphere rolls ON TOP of it smoothly. Hole in the middle: small sphere falls through to diamond.
      const lowFloorY = GROUND_Y + DROP_STEP_H;
      const barH   = 14;
      const barY   = GROUND_Y; // flush with terrain — sphere glides straight onto it
      const gapScreenX = W + 300;
      const holeW  = R_SMALL * 2 + 19;
      const holeScreenX = gapScreenX + DROP_GAP_W / 2;
      // Left bar starts exactly at the gap edge, same length as before
      const leftSx = gapScreenX;
      const leftW  = holeScreenX - holeW / 2 - leftSx;
      const rightSx = holeScreenX + holeW / 2;
      const rightW = 180 - holeW / 2;
      const maxR   = R_BIG;
      const leftBar  = {t:'bar_low', sx:leftSx,  y:barY, w:leftW,  h:barH, maxR, _drop:true};
      const rightBar = {t:'bar_low', sx:rightSx, y:barY, w:rightW, h:barH, maxR, _drop:true};
      obstacles.push(leftBar);
      obstacles.push(rightBar);
      dropGap.holeBarY = barY;
      dropGap.holeW = holeW;
      // Diamond on the lower floor, under the right bar — only reachable if sphere fell through the hole
      collectibles.push({sx: rightSx + rightW/2, y: lowFloorY - R_SMALL - 12, small:true, pulse:Math.random()*Math.PI*2, done:false});
    }
  }

  if (dropState === 'lifting') {
    if (sceneOffsetY < sceneOffsetTarget + 4) dropState = 'dropped';
  }

  if (dropState === 'dropped' && dropGap) {
    const pastLow  = worldX > dropGap.lowFloorEndWX;
    const onLower  = sp.vy === 0 && Math.abs(sp.y - (dropGap.lowY - sp.r)) < 3;
    if (pastLow && onLower) {
      dropState = 'lowering'; sceneOffsetTarget = 0; dropGap = null;
    }
  }

  if (dropState === 'lowering') {
    if (Math.abs(sceneOffsetY) < 1) { sceneOffsetY = 0; dropState = 'idle'; }
  }

  sceneOffsetY = lerp(sceneOffsetY, sceneOffsetTarget, 0.06);

  if(elapsed >= GAME_SECS) endGame();
}
 
/* ─── draw ────────────────────────────────── */
function drawBg(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,BG1); g.addColorStop(1,BG2);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  for(const b of blobs){
    const sx=worldToScreen(b.wx) + trembleOffset;
    ctx.save(); ctx.globalAlpha=b.a;
    ctx.beginPath(); ctx.arc(sx,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle='#c07238'; ctx.fill(); ctx.restore();
  }
}
 
function drawClouds(){
  ctx.save(); ctx.beginPath(); ctx.rect(0,0,W,H); ctx.clip();
  for(const c of clouds){
    const cx = worldToScreen(c.wx) + trembleOffset;
    ctx.save();
    ctx.shadowColor = 'rgba(185, 150, 120, 0.25)'; ctx.shadowBlur = 12; ctx.shadowOffsetY = 6;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.96)';
    ctx.beginPath();
    for(const p of c.puffs){ ctx.moveTo(cx + p.dx + p.r, c.y + p.dy); ctx.arc(cx + p.dx, c.y + p.dy, p.r, 0, Math.PI * 2); }
    ctx.fill(); ctx.restore();
  }
  ctx.restore();
}
 
function drawGround(){
  ctx.save(); ctx.shadowColor='rgba(0,0,0,0.10)'; ctx.shadowBlur=14; ctx.shadowOffsetY=-3;
  if (dropGap) {
    const gapStartSx = worldToScreen(dropGap.gapStartWX);
    const gapEndSx   = worldToScreen(dropGap.gapEndWX);
    const lowY       = dropGap.lowY;
    ctx.fillStyle='#ffffff';
    ctx.fillRect(0,          GROUND_Y+14, gapStartSx,         H-GROUND_Y-14);
    ctx.fillRect(gapEndSx,   lowY+14,     W-gapEndSx,         H-lowY-14);
    ctx.restore(); ctx.save();
    ctx.fillStyle='rgba(230,168,78,0.18)';
    ctx.fillRect(0,        GROUND_Y+14, gapStartSx, 4);
    ctx.fillRect(gapEndSx, lowY+14,     W-gapEndSx, 4);
  } else {
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,GROUND_Y+14,W,H-GROUND_Y-14); ctx.restore(); ctx.save();
    ctx.fillStyle='rgba(230,168,78,0.18)'; ctx.fillRect(0,GROUND_Y+14,W,4);
  }
  ctx.restore();
}

function drawGroundBottomFill(){
  if (sceneOffsetY < 0) {
    ctx.fillStyle='#ffffff';
    ctx.fillRect(0, H+sceneOffsetY, W, -sceneOffsetY+1);
  }
}
 
function drawObstacles(renderPlatformsOnly){
  ctx.save();
  for(const o of obstacles){
    const sx = o.sx + trembleOffset;
    
    const isPlatform = (o.t === 'step_up' || o.t === 'step_down');
    if(renderPlatformsOnly !== isPlatform) continue;

    if (isPlatform) {
      ctx.fillStyle = '#ffffff'; ctx.shadowColor = 'rgba(0,0,0,0.08)'; ctx.shadowBlur = 10; ctx.shadowOffsetY = -2;
      ctx.beginPath();
      if(ctx.roundRect) ctx.roundRect(sx, o.y, o.w, H - o.y, [4, 4, 0, 0]);
      else ctx.rect(sx, o.y, o.w, H - o.y);
      ctx.fill();
      ctx.fillStyle = 'rgba(230,168,78,0.25)'; ctx.fillRect(sx, o.y, o.w, 4);
      continue;
    }

    ctx.shadowColor='rgba(0,0,0,0.12)'; ctx.shadowBlur=8; ctx.shadowOffsetY=3;
    ctx.fillStyle='#ffffff'; ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(sx,o.y,o.w,o.h,4); else ctx.rect(sx,o.y,o.w,o.h);
    ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fillRect(sx+4,o.y+2,o.w-8,3);
     
    if(o.maxR < R_BIG && o.sx<420 && o.sx>-o.w){
      const a=clamp((420-o.sx)/260,0,1);
      ctx.globalAlpha=a*0.6;
      ctx.fillStyle='#c97b3a'; ctx.font='bold 11px Segoe UI'; ctx.textAlign='center';
      ctx.fillText('↓ shrink',sx+o.w/2,o.y-7); ctx.globalAlpha=1;
    }
  }
  ctx.restore();
}
 
function drawTrail(){
  if(trailPts.length<10) return;
  ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round';
  const segs=trailPts.length-1;
 
  for(let i=segs; i>=1; i--){
    const t=i/segs; const alpha=(1-t)*0.78;
    const waveY = 16 * Math.sin(trailPts[i].wx * 0.05) * t;
    const x1=trailPts[i].wx - worldX + SPHERE_X + trembleOffset; const x0=trailPts[i-1].wx - worldX + SPHERE_X + trembleOffset;
    const y1=trailPts[i].y + waveY - (t * 8);
    const y0=trailPts[i-1].y + (16 * Math.sin(trailPts[i-1].wx * 0.05) * ((i-1)/segs)) - (((i-1)/segs) * 8);
    const lw=clamp((1-t)*4.5, 0.6, 4.5);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x0,y0);
    ctx.strokeStyle=`rgba(192,114,56,${alpha})`; ctx.lineWidth=lw; ctx.stroke();
  }
  for(let i=segs; i>=1; i--){
    const t=i/segs; const alpha=(1-t)*0.55;
    const waveY = 16 * Math.sin(trailPts[i].wx * 0.05) * t;
    const x1=trailPts[i].wx - worldX + SPHERE_X + trembleOffset; const x0=trailPts[i-1].wx - worldX + SPHERE_X + trembleOffset;
    const y1=trailPts[i].y + waveY - (t * 8) - 1.5;
    const y0=trailPts[i-1].y + (16 * Math.sin(trailPts[i-1].wx * 0.05) * ((i-1)/segs)) - (((i-1)/segs) * 8) - 1.5;
    const lw=clamp((1-t)*2.0, 0.4, 2.0);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x0,y0);
    ctx.strokeStyle=`rgba(255,245,235,${alpha})`; ctx.lineWidth=lw; ctx.stroke();
  }
  for(let i=segs; i>=1; i--){
    const t=i/segs; const alpha=(1-t)*0.85; 
    const waveY = 16 * Math.sin(trailPts[i].wx * 0.05 + Math.PI) * t;
    const x1=trailPts[i].wx - worldX + SPHERE_X + trembleOffset; const x0=trailPts[i-1].wx - worldX + SPHERE_X + trembleOffset;
    const y1=trailPts[i].y + waveY + (t * 12);
    const y0=trailPts[i-1].y + (16 * Math.sin(trailPts[i-1].wx * 0.05 + Math.PI) * ((i-1)/segs)) + (((i-1)/segs) * 12);
    const lw=clamp((1-t)*3.2, 0.8, 3.2);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x0,y0);
    ctx.strokeStyle=`rgba(255,255,255,${alpha})`; ctx.lineWidth=lw; ctx.stroke();
  }
  ctx.restore();
}
 
function drawSphere(){
  const x=SPHERE_X + trembleOffset, y=sp.y, r=sp.r;
  const g=ctx.createRadialGradient(x-r*0.25,y-r*0.22,r*0.1, x+r*0.1,y+r*0.1,r*1.05);
  g.addColorStop(0, SP_LIT); g.addColorStop(0.45, SP_MID); g.addColorStop(1, SP_BASE);
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.strokeStyle='rgba(120,60,20,0.18)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(x-r*0.30, y-r*0.30, r*0.18, 0, Math.PI*2); ctx.fillStyle='rgba(255,245,235,0.38)'; ctx.fill();
}
 
function drawGems(ts){
  for(const g of collectibles){
    if(g.done) continue;
    const sx = g.sx + trembleOffset; const pulse=0.9+0.1*Math.sin(ts*2.8+g.pulse);
    const hw=8*pulse; const ht=15*pulse; const mid=ht*0.28;  
    ctx.save(); ctx.translate(sx, g.y); ctx.shadowColor='#f5d44a'; ctx.shadowBlur=22;
 
    ctx.save(); ctx.rotate(ts * 0.45 + g.pulse); ctx.fillStyle = 'rgba(255, 235, 170, 0.45)';
    for(let i = 0; i < 8; i++) {
      ctx.rotate(Math.PI / 4); const rayLen = (i % 2 === 0) ? (24 * pulse) : (14 * pulse);
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-2.5, -rayLen * 0.2); ctx.lineTo(0, -rayLen); ctx.lineTo(2.5, -rayLen * 0.2); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
    ctx.fillStyle = 'rgba(255, 250, 210, 0.85)';
    for(let i = 0; i < 4; i++) {
      const angle = (i * Math.PI / 2) + (ts * 0.8) + (g.pulse * i); const orbitDist = 18 + 5 * Math.sin(ts * 2 + i);
      const px = Math.cos(angle) * orbitDist; const py = Math.sin(angle) * orbitDist * 1.2; const size = 1.2 + 0.6 * Math.sin(ts * 4 + i);
      ctx.beginPath(); ctx.arc(px, py, size, 0, Math.PI * 2); ctx.fill();
    }
 
    ctx.beginPath(); ctx.moveTo(0, -ht); ctx.lineTo( hw, -mid); ctx.lineTo( hw*0.7, mid); ctx.lineTo(0, ht); ctx.lineTo(-hw*0.7, mid); ctx.lineTo(-hw, -mid); ctx.closePath();
    const dg=ctx.createLinearGradient(0,-ht,0,ht); dg.addColorStop(0,'#fff0a0'); dg.addColorStop(0.25,'#f9d84a'); dg.addColorStop(0.6,'#e8a820'); dg.addColorStop(1,'#c07800');
    ctx.fillStyle=dg; ctx.fill(); ctx.strokeStyle='rgba(120,70,0,0.65)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.shadowBlur=0; ctx.beginPath(); ctx.moveTo(0,-ht); ctx.lineTo(hw,-mid); ctx.lineTo(0,-mid*0.3); ctx.lineTo(-hw,-mid); ctx.closePath(); ctx.fillStyle='rgba(255,255,200,0.38)'; ctx.fill();
    ctx.restore();
  }
}
 
function drawParticles(){
  ctx.save();
  for(const p of particles){ ctx.globalAlpha=p.life; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fillStyle=p.col; ctx.fill(); }
  ctx.restore();
}
 
function draw(ts){
  ctx.clearRect(0,0,W,H); 
  drawBg(); 
  drawClouds();

  ctx.save();
  ctx.translate(0, sceneOffsetY);

  drawGround(); 
  drawObstacles(true); 
  drawTrail(); 
  drawGems(ts/1000); 
  drawSphere(); 
  drawParticles(); 
  drawObstacles(false);

  ctx.restore();
  drawGroundBottomFill();
  
  if (levelUpEvent.active) drawEncouragementMascot(ts / 1000);
}
 
function drawEncouragementMascot(timeSecs) {
  const baseX = 90; const baseY = H - 66 + levelUpEvent.yOffset; const bounceY = 4 * Math.sin(timeSecs * 7); const squishX = 1 + 0.03 * Math.sin(timeSecs * 7);
  ctx.save(); ctx.translate(baseX, baseY + bounceY); ctx.scale(squishX, 1 - (squishX - 1));
 
  if (levelUpEvent.textAlpha > 0.02) {
    ctx.save(); ctx.globalAlpha = levelUpEvent.textAlpha; ctx.translate(65, -100 - bounceY); ctx.fillStyle = "#ffffff";
    ctx.beginPath(); if(ctx.roundRect) ctx.roundRect(0, 0, 210, 44, 12); else ctx.rect(0, 0, 210, 44);
    ctx.fill();
    ctx.beginPath(); ctx.moveTo(-10, 22); ctx.lineTo(0, 14); ctx.lineTo(0, 30); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#2d2018"; ctx.font = "bold 13px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(levelUpEvent.text, 105, 22); ctx.restore();
  }
 
  ctx.fillStyle = "#e67a3a";
  for (let i = 0; i < 10; i++) {
    const angle = (i / 10) * Math.PI * 2; const px = Math.cos(angle) * 32; const py = Math.sin(angle) * 28 - 20;
    ctx.beginPath(); ctx.arc(px, py, 20, 0, Math.PI * 2); ctx.fill();
  }
  ctx.beginPath(); ctx.arc(0, -20, 35, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#201a18"; ctx.beginPath(); ctx.arc(-14, -26, 12, 0, Math.PI); ctx.fill(); ctx.fillRect(-26, -26, 24, 3); ctx.beginPath(); ctx.arc(14, -26, 12, 0, Math.PI); ctx.fill(); ctx.fillRect(2, -26, 24, 3); ctx.fillRect(-4, -26, 8, 3);
  ctx.strokeStyle = "rgba(255,255,255,0.45)"; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(-20, -21); ctx.lineTo(-12, -17); ctx.stroke(); ctx.beginPath(); ctx.moveTo(8, -21);  ctx.lineTo(16, -17); ctx.stroke();
  ctx.strokeStyle = "#201a18"; ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.beginPath(); ctx.arc(0, -10, 8, 0.1, Math.PI - 0.1); ctx.stroke(); ctx.restore();
}
 
function loop(ts){
  if(gs!=='playing') return;
  const dt=clamp((ts-lastTs)/1000,0,0.05); lastTs=ts;
  update(dt); draw(ts);
  document.getElementById('scoreVal').textContent=Math.floor(score);
  document.getElementById('diamondVal').textContent=gems;
  document.getElementById('progressFill').style.width=(elapsed/GAME_SECS*100).toFixed(1)+'%';
  animId = requestAnimationFrame(loop);
}
 
function startGame(){ cancelAnimationFrame(animId); reset(); gs='playing'; document.getElementById('overlay').style.display='none'; document.getElementById('pauseOverlay').style.display='none';  bgMusic.currentTime = 0; bgMusic.play().catch(err => console.log("Audio waiting for user gesture:", err)); lastTs=performance.now(); animId = requestAnimationFrame(loop); }
function endGame(){ gs='end'; gs='end'; 
  bgMusic.pause();  document.getElementById('overlay').style.display='flex'; document.getElementById('finalScore').style.display='block'; document.getElementById('finalScore').textContent=`Score: ${Math.floor(score)} · Diamonds: ${gems}`; document.getElementById('actionBtn').textContent='Play Again'; }
function pause(){ if(gs==='playing') { gs='paused'; congratsSound.pause(); bgMusic.volume = 0.08; document.getElementById('pauseOverlay').style.display='flex'; } }
function resume(){ if(gs==='paused') { cancelAnimationFrame(animId); gs='playing'; if(levelUpEvent.active && levelUpEvent.timer > 0) {
      congratsSound.play().catch(() => {});  bgMusic.volume = 0.4; 
    }document.getElementById('pauseOverlay').style.display='none'; lastTs=performance.now(); animId = requestAnimationFrame(loop); } }
 
document.addEventListener('keydown',e=>{ keys[e.key]=true; if(e.key===' ') e.preventDefault(); if(e.key==='Escape'||e.key==='p') gs==='paused'?resume():pause(); });
document.addEventListener('keyup',e=>{ keys[e.key]=false; });
canvas.addEventListener('touchstart',e=>{ keys[' ']=true; e.preventDefault(); },{passive:false});
canvas.addEventListener('touchend',  e=>{ keys[' ']=false;e.preventDefault(); },{passive:false});
 
document.getElementById('actionBtn').addEventListener('click',startGame);
document.getElementById('pauseBtn') .addEventListener('click',()=>gs==='paused'?resume():pause());
document.getElementById('resumeBtn').addEventListener('click',resume);
 
(function menuLoop(ts){
  if(gs!=='menu') return;
  ctx.clearRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,BG1); g.addColorStop(1,BG2); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); drawGround();
  const x=SPHERE_X,y=GROUND_Y-R_BIG,r=R_BIG;
  const sg=ctx.createRadialGradient(x-r*.25,y-r*.22,r*.1,x+r*.1,y+r*.1,r*1.05); sg.addColorStop(0,SP_LIT); sg.addColorStop(.45,SP_MID); sg.addColorStop(1,SP_BASE);
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle=sg; ctx.fill();
  ctx.beginPath(); ctx.arc(x-r*.30,y-r*.30,r*.18,0,Math.PI*2); ctx.fillStyle='rgba(255,245,235,0.38)'; ctx.fill();
  requestAnimationFrame(menuLoop);
})();
// Mute Button Handler
document.getElementById('muteBtn').addEventListener('click', () => {
  isMuted = !isMuted; // Toggle status
  
  // Apply muting logic across all audio items
  bgMusic.muted = isMuted;
  congratsSound.muted = isMuted;
  diamondSound.muted = isMuted;
  
  // Update UI visuals
  const muteBtn = document.getElementById('muteBtn');
  const muteIcon = document.getElementById('muteIcon');
  
  if (isMuted) {
    muteIcon.textContent = '🔇';
    muteBtn.style.background = '#6b7280'; // Shifts to a subtle gray when muted
    muteBtn.childNodes[1].nodeValue = ' Unmute';
  } else {
    muteIcon.textContent = '🔊';
    muteBtn.style.background = '#2272b8'; // Returns to matching brand blue
    muteBtn.childNodes[1].nodeValue = ' Mute';
  }
});
</script>
